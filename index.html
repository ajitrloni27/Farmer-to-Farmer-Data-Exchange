<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
  
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Farmer System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- REGISTER -->
<div id="registerPage" class="page" style="display:block;">
<div class="card">
<h2>Register</h2>
<input id="regName" placeholder="Name">
<input id="regPhone" placeholder="Phone">
<input id="regPass" type="password" placeholder="Password">
<button onclick="registerUser()">Register</button>
<p><a href="#" onclick="showPage('loginPage')">Login</a></p>
</div>
</div>
<!-- LOGIN -->
<div id="loginPage" class="page">
<div class="card">
<h2>Login</h2>
<input id="loginPhone" placeholder="Phone">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>
<!-- NAV -->
<nav id="navbar" style="display:none;">
<div>
<button onclick="showMain('home')">Home</button>
<button onclick="showMain('create')">Create</button>
<button onclick="showMain('people')">People</button>
</div>
<div style="display:flex;gap:10px;align-items:center;">
<div id="navProfileIcon" class="profile-icon" onclick="showMain('profile')">👤</div>
<button onclick="logout()">Logout</button>
</div>
</nav>
<!-- HOME -->
<div id="home" class="page">
<h2>Posts</h2>
<div id="postsList"></div>
</div>
<!-- CREATE -->
<div id="create" class="page">
<h2>Create Post</h2>
<input id="crop" placeholder="Crop">
<textarea id="text" placeholder="Write"></textarea>
<input id="imgFile" type="file">
<button onclick="createPost()">Post</button>
</div>
<!-- PEOPLE -->
<div id="people" class="page">
<h2>Farmers</h2>
<div id="peopleList"></div>
</div>
<!-- PROFILE -->
<div id="profile" class="page">
<h2>Profile</h2>
<input id="editName">
<input id="editPass" type="password" placeholder="New Password">
<button onclick="saveProfile()">Save</button>
</div>
<script src="script.js"></script>
</body>
</html>
